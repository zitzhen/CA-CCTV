name: CA-CCTV

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      init:
        description: "Initialize state without sending alerts"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: ca-cctv
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ensure state directory exists
        run: |
          mkdir -p .ct-state

      - name: Run CA-CCTV
        id: ct
        run: |
          if [ "${{ github.event.inputs.init }}" = "true" ]; then
            python ct_watch.py --init
          else
            python ct_watch.py
          fi

      - name: Send email alert
        if: steps.ct.outputs.has_new == 'true' && github.event.inputs.init != 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          python email.py \
            --count "${{ steps.ct.outputs.count }}" \
            --summary "${{ steps.ct.outputs.summary }}"

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p .ct-state
          git add .ct-state/

          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "Update certificate state"
            git push
          fi